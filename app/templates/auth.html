<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentification - AquaLeak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { slate: { 850: '#151e2e', 900: '#0f172a' } }
                }
            }
        }
    </script>
    <style>
        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-900 font-sans antialiased h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Fond Grille -->
    <div class="absolute inset-0 bg-grid-pattern opacity-30 pointer-events-none"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-lg h-full max-h-[500px] bg-cyan-500/20 blur-[100px] rounded-full pointer-events-none"></div>

    <!-- Conteneur de Notification (Toast) -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 transform transition-all duration-300 translate-x-full opacity-0">
        <div id="toast-content" class="flex items-center w-full max-w-xs p-4 rounded-lg shadow-lg bg-white border-l-4">
            <div id="toast-icon" class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg">
                <!-- Icon will be injected here -->
            </div>
            <div class="ml-3 text-sm font-normal text-slate-800" id="toast-message">Message ici</div>
            <button type="button" onclick="hideToast()" class="ml-auto -mx-1.5 -my-1.5 bg-white text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex h-8 w-8">
                <span class="sr-only">Fermer</span>
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
            </button>
        </div>
    </div>

    <!-- Carte Principale -->
    <div class="relative z-10 w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 mx-4">
        
        <!-- Logo -->
        <div class="flex flex-col items-center mb-8">
            <svg class="w-12 h-12 text-cyan-500 mb-3" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M7.5 10C7.5 10 4.5 12.5 4.5 14.5C4.5 16.1569 5.84315 17.5 7.5 17.5C9.15685 17.5 10.5 16.1569 10.5 14.5C10.5 12.5 7.5 10 7.5 10Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M16 5C16 5 11.5 9 11.5 13.5C11.5 15.9853 13.5147 18 16 18C18.4853 18 20.5 15.9853 20.5 13.5C20.5 9 16 5 16 5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1 class="text-2xl font-bold text-slate-800">AquaLeak</h1>
            <p class="text-slate-500 text-sm mt-1">Connectez-vous pour accéder à votre tableau de bord</p>
        </div>

        <!-- Onglets -->
        <div class="bg-slate-100 p-1 rounded-lg flex mb-6 relative">
            <button onclick="switchTab('login')" id="tab-login" class="w-1/2 py-2 rounded-md text-sm font-semibold shadow-sm bg-white text-slate-800 transition-all duration-200">Connexion</button>
            <button onclick="switchTab('register')" id="tab-register" class="w-1/2 py-2 rounded-md text-sm font-medium text-slate-500 hover:text-slate-700 transition-all duration-200">Inscription</button>
        </div>

        <!-- Formulaire Connexion -->
        <form id="form-login" class="space-y-5 animate-fade-in">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                    </div>
                    <input type="email" required placeholder="votre@email.com" class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg bg-slate-50 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 sm:text-sm transition-shadow">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Mot de passe</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                    </div>
                    <input type="password" required placeholder="••••••••" class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg bg-slate-50 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 sm:text-sm transition-shadow">
                </div>
            </div>
            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cyan-500 transition-all transform hover:-translate-y-0.5">
                Se connecter
            </button>
            <div class="text-center mt-4">
                <a href="#" class="text-sm text-slate-400 hover:text-cyan-600">Mot de passe oublié ?</a>
            </div>
        </form>

        <!-- Formulaire Inscription -->
        <form id="form-register" class="space-y-5 hidden animate-fade-in">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                    </div>
                    <input type="email" required placeholder="votre@email.com" class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg bg-slate-50 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 sm:text-sm transition-shadow">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Mot de passe</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                    </div>
                    <input type="password" required placeholder="Min. 6 caractères" class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg bg-slate-50 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 sm:text-sm transition-shadow">
                </div>
            </div>
             <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Confirmer le mot de passe</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                    </div>
                    <input type="password" required placeholder="Répétez le mot de passe" class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg bg-slate-50 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 sm:text-sm transition-shadow">
                </div>
            </div>
            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cyan-500 transition-all transform hover:-translate-y-0.5">
                Créer un compte
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="/" class="text-sm text-slate-400 hover:text-slate-600 transition-colors">← Retour à l'accueil</a>
        </div>
    </div>

    <!-- Javascript Fonctionnel -->
    <script>
        // --- FONCTION DE NOTIFICATION (TOAST) ---
        let toastTimeout;

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const content = document.getElementById('toast-content');
            const messageEl = document.getElementById('toast-message');
            const iconEl = document.getElementById('toast-icon');

            // Reset Animation
            clearTimeout(toastTimeout);
            container.classList.remove('translate-x-full', 'opacity-0');
            container.classList.add('translate-x-0', 'opacity-100');

            // Contenu
            messageEl.innerText = message;

            // Styles selon le type
            if (type === 'success') {
                content.className = "flex items-center w-full max-w-xs p-4 rounded-lg shadow-lg bg-white border-l-4 border-green-500 text-green-800";
                iconEl.className = "inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-green-500 bg-green-100 rounded-lg";
                iconEl.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>`;
            } else {
                content.className = "flex items-center w-full max-w-xs p-4 rounded-lg shadow-lg bg-white border-l-4 border-red-500 text-red-800";
                iconEl.className = "inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-red-500 bg-red-100 rounded-lg";
                iconEl.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>`;
            }

            // Cacher automatiquement après 4 secondes
            toastTimeout = setTimeout(() => {
                hideToast();
            }, 4000);
        }

        function hideToast() {
            const container = document.getElementById('toast-container');
            container.classList.add('translate-x-full', 'opacity-0');
            container.classList.remove('translate-x-0', 'opacity-100');
        }

        // --- GESTION DES ONGLETS ---
        function switchTab(tab) {
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                
                tabLogin.className = "w-1/2 py-2 rounded-md text-sm font-semibold shadow-sm bg-white text-slate-800 transition-all duration-200";
                tabRegister.className = "w-1/2 py-2 rounded-md text-sm font-medium text-slate-500 hover:text-slate-700 transition-all duration-200";
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');

                tabRegister.className = "w-1/2 py-2 rounded-md text-sm font-semibold shadow-sm bg-white text-slate-800 transition-all duration-200";
                tabLogin.className = "w-1/2 py-2 rounded-md text-sm font-medium text-slate-500 hover:text-slate-700 transition-all duration-200";
            }
        }

        // --- INSCRIPTION (Avec Toast) ---
        document.getElementById('form-register').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = this.querySelector('input[type="email"]').value;
            const passwords = this.querySelectorAll('input[type="password"]');
            const password = passwords[0].value;
            const confirm = passwords[1].value;

            if(password !== confirm) {
                showToast("Les mots de passe ne correspondent pas.", "error");
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email: email, password: password})
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // ✅ Affiche la jolie notification au lieu de l'alert
                    showToast("Compte créé avec succès ! Connectez-vous.", "success");
                    switchTab('login');
                } else {
                    showToast("Erreur : " + (data.detail || "Problème inconnu"), "error");
                }
            } catch (error) {
                console.error(error);
                showToast("Erreur de connexion au serveur.", "error");
            }
        });

        // --- CONNEXION (Avec Redirection Corrigée) ---
        document.getElementById('form-login').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = this.querySelector('input[type="email"]').value;
            const password = this.querySelector('input[type="password"]').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email: email, password: password})
                });

                const data = await response.json();

                if (response.ok) {
                    // ✅ Sauvegarde l'email pour le profil utilisateur
                    localStorage.setItem('user_email', email);

                    showToast("Connexion réussie ! Redirection...", "success");
                    // Petite pause pour voir la notification avant de rediriger
                    setTimeout(() => {
                        window.location.href = data.redirect; // Redirigera vers /documentation
                    }, 1000);
                } else {
                    showToast("Erreur : " + (data.detail || "Identifiants incorrects"), "error");
                }
            } catch (error) {
                console.error(error);
                showToast("Erreur de connexion au serveur.", "error");
            }
        });
    </script>
</body>
</html>
