<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détection Fuites d'Eau</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800">

    <!-- Navbar -->
    <nav class="bg-blue-600 p-4 text-white shadow-md">
        <div class="container mx-auto font-bold text-xl">
            💧 WaterGuard - Détection Urbaine
        </div>
    </nav>

    <!-- Contenu Principal -->
    <div class="container mx-auto mt-10 p-4">
        <h1 class="text-3xl font-bold mb-6">Tableau de Bord</h1>

        <!-- Cartes de statut -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Carte 1 -->
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-green-500">
                <h2 class="text-gray-500 uppercase text-sm">État du Système</h2>
                <p class="text-2xl font-bold">{{ system_status }}</p>
            </div>

            <!-- Carte 2 -->
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-500">
                <h2 class="text-gray-500 uppercase text-sm">Pression Moyenne</h2>
                <p class="text-2xl font-bold">{{ pressure }}</p>
            </div>

            <!-- Carte 3 -->
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-red-500">
                <h2 class="text-gray-500 uppercase text-sm">Fuites Détectées</h2>
                <p class="text-2xl font-bold text-red-600">{{ leaks_detected }}</p>
            </div>
        </div>
        
        <div class="mt-8 bg-white p-6 rounded-lg shadow">
            <h3 class="text-xl font-bold mb-4">Actions</h3>
            <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                Lancer une analyse
            </button>
        </div>
    </div>

</body>
</html>
